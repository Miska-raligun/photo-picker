name: release

# Build self-contained bundles (binary + embedded UI + bundled models +
# launcher) for Linux / macOS / Windows and attach them to a GitHub Release.
# Triggers on version tags (v*) and can be run manually from the Actions tab.
#
# Cross-platform works via ort's `download-binaries` feature: each runner
# fetches the prebuilt onnxruntime *static* lib for its own target at build
# time (same pyke CDN the vendored Linux lib comes from), so every binary
# stays self-contained. The vendored ORT_LIB_LOCATION (Linux-only) is removed
# before building so the download path activates.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            bin: photo-pick-server
          - os: macos-latest
            artifact: macos-arm64
            bin: photo-pick-server
          - os: windows-latest
            artifact: windows-x86_64
            bin: photo-pick-server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        working-directory: web
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Drop the vendored ORT_LIB_LOCATION (Linux-only static lib) so ort's
      # download-binaries fetches the right static lib for this runner's target.
      - name: Use download-binaries for onnxruntime
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build server (release, native target)
        shell: bash
        run: cargo build --release -p photo-pick-server --features onnx-download

      - name: Fetch models
        shell: bash
        run: bash scripts/fetch_models.sh staging/photo-pick/models

      - name: Assemble bundle
        shell: bash
        run: |
          mkdir -p staging/photo-pick
          cp "target/release/${{ matrix.bin }}" staging/photo-pick/
          cp packaging/README.md staging/photo-pick/
          # Ship third-party license texts (currently LGPL-2.1 for rawler) so
          # binary distribution complies with the LGPL Section 6 requirement.
          cp -r LICENSES staging/photo-pick/
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp packaging/run.bat staging/photo-pick/
          else
            cp packaging/run.sh staging/photo-pick/
            chmod +x staging/photo-pick/run.sh "staging/photo-pick/${{ matrix.bin }}"
          fi
          tarball="photo-pick-${GITHUB_REF_NAME}-${{ matrix.artifact }}.tar.gz"
          tar -C staging -czf "$tarball" photo-pick
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$tarball" > "$tarball.sha256"
          else
            shasum -a 256 "$tarball" > "$tarball.sha256"
          fi
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
          generate_release_notes: true
