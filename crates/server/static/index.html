<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>photo-pick</title>
<style>
:root {
  --bg: #faf9f5;
  --surface: #ffffff;
  --surface-alt: #f5f2eb;
  --text: #1f1e1a;
  --muted: #65645d;
  --border: #e5e2da;
  --border-strong: #d4d0c4;
  --accent: #cc6646;
  --accent-hover: #b5573b;
  --accent-tint: #fbeee7;
  --kept: #5e8a4a;
  --kept-tint: #eaf1e3;
  --warning: #c08d2d;
  --error: #b8453c;
  --shadow: 0 1px 3px rgba(31, 30, 26, 0.04), 0 1px 2px rgba(31, 30, 26, 0.06);
  --shadow-md: 0 4px 12px rgba(31, 30, 26, 0.06), 0 2px 4px rgba(31, 30, 26, 0.04);
}

* { box-sizing: border-box; }

body {
  font-family: -apple-system, "Inter", BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 15px;
}

.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

header.page-header {
  margin-bottom: 2.5rem;
}
header.page-header h1 {
  margin: 0 0 0.4rem;
  font-size: 2rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}
header.page-header .tagline {
  margin: 0;
  color: var(--muted);
  font-size: 0.95rem;
}

.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin: 0 0 0.75rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.scan-card {
  padding: 1.5rem;
  margin-bottom: 2rem;
}

form#scan-form {
  display: grid;
  gap: 0.9rem;
  grid-template-columns: 1fr 1fr;
}
form#scan-form .full { grid-column: 1 / -1; }

label.field {
  display: flex;
  flex-direction: column;
  font-size: 0.85rem;
  color: var(--muted);
}
label.field strong {
  color: var(--text);
  font-weight: 500;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}
label.field input,
label.field select {
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0.55rem 0.7rem;
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
}
label.field input:focus,
label.field select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-tint);
}

label.checkbox {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.9rem;
  cursor: pointer;
  padding: 0.5rem 0;
}
label.checkbox input { width: 1rem; height: 1rem; accent-color: var(--accent); }

.form-actions {
  grid-column: 1 / -1;
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  margin-top: 0.4rem;
}

button.primary {
  background: var(--accent);
  color: white;
  border: 0;
  border-radius: 8px;
  padding: 0.6rem 1.4rem;
  font-size: 0.9rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
}
button.primary:hover { background: var(--accent-hover); }
button.primary:disabled { background: #b8b5ac; cursor: not-allowed; }

button.secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0.45rem 0.9rem;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
button.secondary:hover { background: var(--surface-alt); border-color: var(--accent); }

select.inline {
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  padding: 0.35rem 0.5rem;
  font-size: 0.85rem;
  font-family: inherit;
  background: var(--surface);
}

#runs { display: flex; flex-direction: column; gap: 1.5rem; }

.run {
  padding: 1.5rem 1.75rem;
}
.run-head {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.4rem;
}
.run-head h3 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
}
.run-head code {
  background: var(--surface-alt);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.8rem;
  color: var(--muted);
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.status-pill.running { background: var(--accent-tint); color: var(--accent-hover); }
.status-pill.running::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s infinite; }
.status-pill.completed { background: var(--kept-tint); color: var(--kept); }
.status-pill.failed { background: #fbe5e2; color: var(--error); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

.run-meta {
  color: var(--muted);
  font-size: 0.82rem;
  margin-bottom: 1rem;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  word-break: break-all;
}

.stats {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
}
.stat-pill {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.75rem;
  font-size: 0.8rem;
}
.stat-pill .label { color: var(--muted); margin-right: 0.4rem; }
.stat-pill .value { font-weight: 600; }
.stat-pill.cache-hit { border-color: var(--kept); }

.comp-group {
  border-top: 1px solid var(--border);
  padding-top: 1.25rem;
  margin-top: 1.25rem;
}
.comp-group:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
.comp-group-head {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
}
.comp-group-head h4 {
  margin: 0;
  font-size: 0.9rem;
  font-weight: 600;
}
.scene-tag {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 1px 7px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}
.photo {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
  transition: transform 0.1s, box-shadow 0.15s;
}
.photo:hover { box-shadow: var(--shadow-md); }
.photo.kept { border-color: var(--kept); border-width: 2px; }
.photo.rejected { opacity: 0.75; }
.photo .thumb-wrap {
  aspect-ratio: 4 / 3;
  background: var(--surface-alt);
  position: relative;
}
.photo .thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.photo .rank-badge {
  position: absolute; top: 8px; left: 8px;
  background: rgba(31, 30, 26, 0.7);
  color: white;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: ui-monospace, monospace;
}
.photo .verdict-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 7px;
  border-radius: 4px;
  color: white;
}
.photo .verdict-badge.kept { background: var(--kept); }
.photo .verdict-badge.rejected { background: rgba(31, 30, 26, 0.55); }
.photo .info {
  padding: 0.5rem 0.65rem;
  font-size: 0.75rem;
}
.photo .filename {
  color: var(--text);
  font-weight: 500;
  margin-bottom: 0.25rem;
  word-break: break-all;
  line-height: 1.3;
}
.photo .score-line {
  color: var(--muted);
  font-family: ui-monospace, monospace;
  font-size: 0.7rem;
  display: flex;
  justify-content: space-between;
}
.photo .score-line .final { color: var(--text); font-weight: 600; }

.rejected-toggle {
  margin: 0.5rem 0 0.75rem;
  font-size: 0.8rem;
  color: var(--muted);
  background: none;
  border: 0;
  padding: 0;
  cursor: pointer;
  font-family: inherit;
}
.rejected-toggle:hover { color: var(--accent); }
.rejected-toggle::before { content: '▸ '; transition: transform 0.1s; display: inline-block; }
.rejected-toggle.open::before { content: '▾ '; }
.rejected-list { display: none; }
.rejected-list.open { display: block; }

.explain-panel {
  margin-top: 0.75rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
.explanation {
  margin-top: 0.75rem;
  background: var(--surface-alt);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 0.85rem 1rem;
  font-size: 0.88rem;
  line-height: 1.6;
  white-space: pre-wrap;
}
.explanation .meta {
  color: var(--muted);
  font-size: 0.72rem;
  font-family: ui-monospace, monospace;
  margin-bottom: 0.4rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.explanation.loading { color: var(--muted); font-style: italic; }
.explanation.error { border-left-color: var(--error); }

.run-footer {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.run-footer a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.85rem;
}
.run-footer a:hover { text-decoration: underline; }

.error-message {
  background: #fbe5e2;
  border: 1px solid #f0c5bf;
  border-radius: 8px;
  padding: 0.75rem 1rem;
  color: var(--error);
  font-family: ui-monospace, monospace;
  font-size: 0.8rem;
  white-space: pre-wrap;
}

.empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
  padding: 3rem 1rem;
  font-style: italic;
}
</style>
</head>
<body>
<div class="container">

<header class="page-header">
  <h1>photo-pick</h1>
  <p class="tagline">Local two-stage culling for burst-mode photography. Pipeline + VLM, fully on your machine.</p>
</header>

<div class="card scan-card">
  <p class="section-label">Configure scan</p>
  <form id="scan-form">
    <label class="field full">
      <strong>Source directory</strong>
      <input name="root" type="text" placeholder="/path/to/shoot" required>
    </label>
    <label class="field full">
      <strong>Output directory</strong>
      <input name="output" type="text" placeholder="/path/to/picks" required>
    </label>
    <label class="field">
      <strong>K1 — per burst</strong>
      <input name="k1" type="number" value="3" min="1" max="20">
    </label>
    <label class="field">
      <strong>K2 — per composition</strong>
      <input name="k2" type="number" value="1" min="1" max="10">
    </label>
    <label class="field">
      <strong>Stage A time-k (×median)</strong>
      <input name="time_k" type="number" step="0.1" value="3.0">
    </label>
    <label class="field">
      <strong>Stage B CLIP threshold</strong>
      <input name="stage_b_threshold" type="number" step="0.01" value="0.93" min="0" max="1">
    </label>
    <label class="checkbox full">
      <input name="enable_clip" type="checkbox" checked>
      <span>Run CLIP (enables Stage B composition clustering)</span>
    </label>
    <div class="form-actions">
      <button type="submit" class="primary" id="submit-btn">Run scan</button>
    </div>
  </form>
</div>

<p class="section-label">Runs</p>
<div id="runs"></div>

<script>
const form = document.getElementById('scan-form');
const runsEl = document.getElementById('runs');
const submitBtn = document.getElementById('submit-btn');
const knownRuns = new Map(); // id -> {root, output}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  const fd = new FormData(form);
  const body = {
    root: fd.get('root'),
    output: fd.get('output'),
    k1: parseInt(fd.get('k1')),
    k2: parseInt(fd.get('k2')),
    time_k: parseFloat(fd.get('time_k')),
    stage_b_threshold: parseFloat(fd.get('stage_b_threshold')),
    enable_clip: fd.get('enable_clip') === 'on',
  };
  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const { run_id } = await resp.json();
    knownRuns.set(run_id, { root: body.root, output: body.output });
    renderRunPlaceholder(run_id, body);
    pollRun(run_id);
  } catch (err) {
    alert('Failed to start scan: ' + err.message);
  } finally {
    submitBtn.disabled = false;
  }
});

function renderRunPlaceholder(id, body) {
  let el = document.getElementById('run-' + id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'card run';
    el.id = 'run-' + id;
    runsEl.prepend(el);
    removeEmpty();
  }
  el.innerHTML = `
    <div class="run-head">
      <span class="status-pill running">running</span>
      <h3>scan in progress</h3>
      <code>${id.slice(0,8)}</code>
    </div>
    <div class="run-meta">${escapeHtml(body.root)} → ${escapeHtml(body.output)}</div>
  `;
}

async function pollRun(id) {
  for (let i = 0; ; i++) {
    await sleep(i < 5 ? 200 : 700);
    let data;
    try {
      const resp = await fetch('/api/runs/' + id);
      if (!resp.ok) { renderFailed(id, 'lost run'); return; }
      data = await resp.json();
    } catch (err) {
      renderFailed(id, err.toString());
      return;
    }
    renderRun(id, data);
    if (data.status?.state !== 'running') break;
  }
}

function renderRun(id, data) {
  let el = document.getElementById('run-' + id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'card run';
    el.id = 'run-' + id;
    runsEl.prepend(el);
    removeEmpty();
  }
  const state = data.status?.state || 'unknown';
  const error = data.status?.error;
  const report = data.report;
  const picks = data.composition_picks || [];

  let html = `
    <div class="run-head">
      <span class="status-pill ${state}">${state}</span>
      <h3>${state === 'completed' ? 'scan complete' : state === 'failed' ? 'scan failed' : 'scan in progress'}</h3>
      <code>${id.slice(0,8)}</code>
    </div>
    <div class="run-meta">${escapeHtml(data.root || '')} → ${escapeHtml(data.output || '')}</div>
  `;

  if (report) {
    html += `<div class="stats">
      <span class="stat-pill"><span class="label">photos</span><span class="value">${report.photo_count}</span></span>
      <span class="stat-pill ${report.cached_count > 0 ? 'cache-hit' : ''}"><span class="label">cache</span><span class="value">${report.cached_count}/${report.photo_count}</span></span>
      <span class="stat-pill"><span class="label">bursts</span><span class="value">${report.stage_a_group_count}</span></span>
      <span class="stat-pill"><span class="label">comp groups</span><span class="value">${report.stage_b_group_count}</span></span>
      <span class="stat-pill"><span class="label">kept</span><span class="value">${report.picked_count}</span></span>
      <span class="stat-pill"><span class="label">rejected</span><span class="value">${report.rejected_count}</span></span>
      <span class="stat-pill"><span class="label">elapsed</span><span class="value">${(report.elapsed.secs + report.elapsed.nanos/1e9).toFixed(2)}s</span></span>
    </div>`;
  }

  for (const pick of picks) {
    html += renderCompositionGroup(id, pick);
  }

  if (error) {
    html += `<div class="error-message">${escapeHtml(error)}</div>`;
  }

  if (state === 'completed') {
    html += `<div class="run-footer">
      <a href="/api/runs/${id}/html" target="_blank">Open full HTML report →</a>
    </div>`;
  }

  el.innerHTML = html;
}

function renderFailed(id, msg) {
  renderRun(id, { status: { state: 'failed', error: msg }, root: knownRuns.get(id)?.root, output: knownRuns.get(id)?.output });
}

function renderCompositionGroup(runId, pick) {
  const renderPhoto = (p, isKept) => {
    const fs = p.final_score || {};
    const thumb = `/api/runs/${runId}/thumb/${p.photo_id}`;
    return `
      <div class="photo ${isKept ? 'kept' : 'rejected'}">
        <div class="thumb-wrap">
          <img loading="lazy" src="${thumb}" alt="${escapeHtml(p.filename || '')}">
          <span class="verdict-badge ${isKept ? 'kept' : 'rejected'}">${isKept ? 'kept' : 'rejected'}</span>
        </div>
        <div class="info">
          <div class="filename">${escapeHtml(p.filename || p.photo_id.slice(0,8))}</div>
          <div class="score-line">
            <span>tech ${fmt(fs.tech)} · face ${fmt(fs.face_bonus)}</span>
            <span class="final">${fmt(fs.value)}</span>
          </div>
        </div>
      </div>
    `;
  };

  const keptHtml = pick.kept.map(p => renderPhoto(p, true)).join('');
  const rejectedHtml = pick.rejected.map(p => renderPhoto(p, false)).join('');
  const rejToggleId = `rejtoggle-${runId}-${pick.index}`;
  const rejListId = `rejlist-${runId}-${pick.index}`;

  return `
    <section class="comp-group">
      <div class="comp-group-head">
        <h4>composition #${pick.index}</h4>
        <span class="scene-tag">${escapeHtml(pick.scene)}</span>
        <span class="stat-pill" style="margin-left:auto">
          <span class="label">kept</span><span class="value">${pick.kept.length}/${pick.kept.length + pick.rejected.length}</span>
        </span>
      </div>
      <div class="photo-grid">${keptHtml}</div>
      ${pick.rejected.length > 0 ? `
        <button class="rejected-toggle" id="${rejToggleId}"
          onclick="toggleRejected('${rejToggleId}', '${rejListId}')">show ${pick.rejected.length} rejected</button>
        <div class="rejected-list" id="${rejListId}">
          <div class="photo-grid">${rejectedHtml}</div>
        </div>
      ` : ''}
      ${renderExplainBlock(runId, pick.index)}
    </section>
  `;
}

function renderExplainBlock(runId, idx) {
  return `
    <div class="explain-panel">
      <select class="inline" id="prov-${runId}-${idx}">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
      </select>
      <button class="secondary" onclick="askExplain('${runId}', ${idx})">Ask VLM why</button>
    </div>
    <div id="exp-${runId}-${idx}"></div>
  `;
}

function toggleRejected(toggleId, listId) {
  const t = document.getElementById(toggleId);
  const l = document.getElementById(listId);
  if (l.classList.contains('open')) {
    l.classList.remove('open'); t.classList.remove('open');
    t.textContent = `show ${l.querySelectorAll('.photo').length} rejected`;
  } else {
    l.classList.add('open'); t.classList.add('open');
    t.textContent = `hide rejected`;
  }
}

async function askExplain(runId, idx) {
  const provider = document.getElementById(`prov-${runId}-${idx}`).value;
  const out = document.getElementById(`exp-${runId}-${idx}`);
  out.innerHTML = `<div class="explanation loading"><div class="meta">${escapeHtml(provider)} · thinking...</div></div>`;
  try {
    const resp = await fetch(`/api/runs/${runId}/explain`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ composition_index: idx, provider }),
    });
    const text = await resp.text();
    if (!resp.ok) {
      out.innerHTML = `<div class="explanation error"><div class="meta">${escapeHtml(provider)} · failed</div>${escapeHtml(text)}</div>`;
      return;
    }
    const data = JSON.parse(text);
    out.innerHTML = `<div class="explanation"><div class="meta">${escapeHtml(data.provider)} / ${escapeHtml(data.model)}</div>${escapeHtml(data.text)}</div>`;
  } catch (err) {
    out.innerHTML = `<div class="explanation error"><div class="meta">network error</div>${escapeHtml(err.toString())}</div>`;
  }
}

function fmt(v) { return v == null ? '–' : v.toFixed(2); }
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function removeEmpty() { const e = document.getElementById('empty-state'); if (e) e.remove(); }

// Initial load: existing runs (e.g. after server restart we'd lose state, but
// this still picks up runs from this session).
(async () => {
  try {
    const resp = await fetch('/api/runs');
    const runs = await resp.json();
    if (runs.length === 0) {
      runsEl.innerHTML = '<div class="empty" id="empty-state">No runs yet. Configure a scan above to get started.</div>';
      return;
    }
    runs.sort((a, b) => a.id.localeCompare(b.id));
    for (const r of runs) {
      const resp = await fetch('/api/runs/' + r.id);
      if (resp.ok) renderRun(r.id, await resp.json());
    }
  } catch (e) {
    console.error(e);
  }
})();
</script>
