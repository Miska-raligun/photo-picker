<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>photo-pick</title>
<style>
:root {
  --bg: #fafafa; --fg: #1a1a1a; --muted: #666; --border: #e0e0e0;
  --accent: #2563eb; --accent-hover: #1d4ed8;
  --success: #16a34a; --error: #dc2626; --warn: #d97706;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  margin: 0; padding: 2rem; background: var(--bg); color: var(--fg); line-height: 1.4;
  max-width: 900px; margin-left: auto; margin-right: auto;
}
h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
.sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
form {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 1.25rem; margin-bottom: 1.5rem;
  display: grid; gap: 0.75rem;
  grid-template-columns: 1fr 1fr;
}
form .full { grid-column: span 2; }
label { display: flex; flex-direction: column; font-size: 0.85rem; color: var(--muted); }
label strong { color: var(--fg); font-weight: 600; margin-bottom: 0.25rem; }
input, select {
  border: 1px solid var(--border); border-radius: 4px; padding: 0.4rem 0.6rem;
  font-size: 0.9rem; font-family: inherit;
}
input[type="checkbox"] { margin-right: 0.4rem; }
.actions { grid-column: span 2; display: flex; justify-content: flex-end; gap: 0.5rem; }
button {
  background: var(--accent); color: white; border: 0; border-radius: 4px;
  padding: 0.55rem 1.1rem; font-size: 0.9rem; cursor: pointer;
}
button:hover { background: var(--accent-hover); }
button:disabled { background: #bbb; cursor: wait; }
.run {
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 1.25rem; margin-bottom: 1rem;
}
.run h3 { margin: 0 0 0.5rem; font-size: 1rem; }
.run .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.75rem; }
.status { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
.status.running { background: var(--warn); color: white; }
.status.completed { background: var(--success); color: white; }
.status.failed { background: var(--error); color: white; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.5rem; margin: 0.75rem 0; }
.stat { background: #f5f5f5; padding: 0.5rem 0.75rem; border-radius: 4px; }
.stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
.stat .value { font-size: 1.1rem; font-weight: 600; }
.run a.report { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
.run a.report:hover { text-decoration: underline; }
.error { color: var(--error); font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>photo-pick</h1>
<div class="sub">Local photo-culling pipeline. Trigger a scan, watch it run, browse the report.</div>

<form id="scan-form">
  <label class="full">
    <strong>Source directory</strong>
    <input name="root" type="text" placeholder="/path/to/shoot" required>
  </label>
  <label class="full">
    <strong>Output directory</strong>
    <input name="output" type="text" placeholder="/path/to/picks" required>
  </label>
  <label><strong>K1 (per burst)</strong><input name="k1" type="number" value="3" min="1"></label>
  <label><strong>K2 (per composition)</strong><input name="k2" type="number" value="1" min="1"></label>
  <label><strong>Stage A time-k</strong><input name="time_k" type="number" step="0.1" value="3.0"></label>
  <label><strong>Stage B threshold</strong><input name="stage_b_threshold" type="number" step="0.01" value="0.93"></label>
  <label class="full" style="flex-direction:row; align-items:center;">
    <input name="enable_clip" type="checkbox" checked>
    <span>Enable CLIP (Stage B composition clustering)</span>
  </label>
  <div class="actions">
    <button type="submit" id="submit-btn">Scan</button>
  </div>
</form>

<div id="runs"></div>

<script>
const form = document.getElementById('scan-form');
const runsEl = document.getElementById('runs');
const submitBtn = document.getElementById('submit-btn');
const activeRuns = new Map();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  const fd = new FormData(form);
  const body = {
    root: fd.get('root'),
    output: fd.get('output'),
    k1: parseInt(fd.get('k1')),
    k2: parseInt(fd.get('k2')),
    time_k: parseFloat(fd.get('time_k')),
    stage_b_threshold: parseFloat(fd.get('stage_b_threshold')),
    enable_clip: fd.get('enable_clip') === 'on',
  };
  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const { run_id } = await resp.json();
    activeRuns.set(run_id, { root: body.root, output: body.output, startedAt: Date.now() });
    renderRun(run_id, { state: 'running' });
    pollRun(run_id);
  } catch (err) {
    alert('scan failed to start: ' + err);
  } finally {
    submitBtn.disabled = false;
  }
});

async function pollRun(id) {
  while (true) {
    await sleep(500);
    try {
      const resp = await fetch('/api/runs/' + id);
      if (!resp.ok) { renderRun(id, { state: 'failed', error: 'lost run' }); return; }
      const data = await resp.json();
      renderRun(id, data);
      if (data.status?.state !== 'running') break;
    } catch (err) {
      renderRun(id, { state: 'failed', error: err.toString() });
      break;
    }
  }
}

function renderRun(id, data) {
  let el = document.getElementById('run-' + id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'run';
    el.id = 'run-' + id;
    runsEl.prepend(el);
  }
  const meta = activeRuns.get(id) || {};
  const state = data.status?.state || data.state || 'unknown';
  const error = data.status?.error || data.error;
  const report = data.report;
  el.innerHTML = `
    <h3><span class="status ${state}">${state}</span> <code>${id.slice(0,8)}</code></h3>
    <div class="meta">${escapeHtml(meta.root || data.root || '')} → ${escapeHtml(meta.output || data.output || '')}</div>
    ${report ? renderStats(report) : ''}
    ${state === 'completed' ? `<a class="report" href="/api/runs/${id}/html" target="_blank">open full HTML report →</a>` : ''}
    ${error ? `<div class="error">${escapeHtml(error)}</div>` : ''}
  `;
}

function renderStats(r) {
  return `<div class="stats">
    <div class="stat"><div class="label">photos</div><div class="value">${r.photo_count}</div></div>
    <div class="stat"><div class="label">cache hits</div><div class="value">${r.cached_count} / ${r.photo_count}</div></div>
    <div class="stat"><div class="label">bursts</div><div class="value">${r.stage_a_group_count}</div></div>
    <div class="stat"><div class="label">comp groups</div><div class="value">${r.stage_b_group_count}</div></div>
    <div class="stat"><div class="label">kept</div><div class="value">${r.picked_count}</div></div>
    <div class="stat"><div class="label">rejected</div><div class="value">${r.rejected_count}</div></div>
    <div class="stat"><div class="label">elapsed</div><div class="value">${(r.elapsed.secs + r.elapsed.nanos/1e9).toFixed(2)}s</div></div>
  </div>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Load existing runs on page open (for restart-resilience demo).
fetch('/api/runs').then(r => r.json()).then(runs => {
  runs.sort((a, b) => a.id.localeCompare(b.id));
  for (const r of runs) renderRun(r.id, r);
}).catch(() => {});
</script>
</body>
</html>
